# config.yaml
data:
  train_path: "ForecastingData_Train.parquet"
  eval_path: "ForecastingData_Eval.parquet"
  target_col: "units_ordered"
  
  num_cols: 
    - "discount"
    - "stock_on_hand"
    - "selling_price"
    - "product_price"
    - "store_traffic_lag_1h" # <-- NEW
    - "category_momentum"
    
  cat_cols:
    - "product_id"
    - "location"
    - "store_id"
    - "product_category"
    - "product_subcategory"
    - "holiday"
    - "is_promotion"
    - "day_of_week"
    - "week_of_year"
    - "month"
    - "year"
    - "hour"
    - "stockout_flag"

training:
  model_type: "xgboost"
  model_save_path: "trained_model_xgboost.pkl"
  use_latent_demand: true

model_params:
  xgboost:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 8
    objective: "reg:tweedie" # CRITICAL: Handles the zero-inflated hourly data perfectly
    tree_method: "hist"      # CRITICAL: Optimizes memory usage for large datasets
  random_forest:
    n_estimators: 100
    max_depth: 10
  catboost:
    loss_function: "Poisson"